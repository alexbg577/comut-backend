services:
  - type: web
    name: comut-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: COMUT_OWNER_EMAIL
        sync: false
      - key: BASE_URL
        value: https://comut-backend.onrender.com
      - key: NODE_ENV
        value: production
